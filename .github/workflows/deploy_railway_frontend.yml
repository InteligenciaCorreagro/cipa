name: Deploy Frontend Railway

on:
  push:
    branches:
      - production-frontend
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy_railway_frontend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy Frontend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_ENVIRONMENT: ${{ secrets.RAILWAY_FRONTEND_ENVIRONMENT }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_FRONTEND_SERVICE }}
        run: railway up --service "$RAILWAY_SERVICE" --environment "$RAILWAY_ENVIRONMENT" --ci
